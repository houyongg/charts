{{- if .Values.container.envSecret.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ default (printf "%s-env" (include "app.fullname" .)) .Values.container.envSecret.name }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml .Values.container.envSecret.stringData | nindent 2 }}
{{- end }}
