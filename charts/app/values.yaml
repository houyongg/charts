# Default values for app.
# This chart is intended to be used via Flux HelmRelease + valuesFrom(ConfigMap/Secret).

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: regsecret

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

deploymentAnnotations: {}

podSecurityContext: {}
securityContext: {}

updateStrategy: {}

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

container:
  name: ""
  ports:
    - name: http
      containerPort: 80
      protocol: TCP
  command: []
  args: []
  env: []
  envFrom: []

  # If enabled, a ConfigMap will be created and mounted as envFrom.
  envConfigMap:
    enabled: false
    name: ""
    data: {}

  # If enabled, a Secret will be created and mounted as envFrom.
  envSecret:
    enabled: false
    name: ""
    stringData: {}

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 2Gi

  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}

  volumeMounts: []

initContainers: []
extraContainers: []

volumes: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

chpa:
  enabled: false
  name: ""
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ""
  jobs:
    - name: scale-up-weekdays
      schedule: "0 0 8 * * 1-5"
      targetSize: 1
      runOnce: false
    - name: scale-down-weekdays
      schedule: "0 0 20 * * 1-5"
      targetSize: 0
      runOnce: false

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: null
  path: /metrics
  scheme: http
  relabelings: []
  metricRelabelings: []
  labels: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
