# Default values for app.
# This chart is intended to be used via Flux HelmRelease + valuesFrom(ConfigMap/Secret).

nameOverride: ""
fullnameOverride: ""

# 仅当 autoscaling.enabled 与 chpa.enabled 均为 false 时才会写入 Deployment.spec.replicas。
# 任一为 true 时副本由 HPA / CronHPA 接管，修改本字段不会生效，也不会因副本数单独触发滚动更新。
replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets:
  - name: regsecret

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

deploymentAnnotations: {}

podSecurityContext: {}
securityContext: {}

updateStrategy: {}

service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

container:
  name: ""
  ports:
    - name: http
      containerPort: 80
      protocol: TCP
  command: []
  args: []
  env: []
  envFrom: []

  # If enabled, a ConfigMap will be created and mounted as envFrom.
  envConfigMap:
    enabled: false
    name: ""
    data: {}

  # If enabled, a Secret will be created and mounted as envFrom.
  envSecret:
    enabled: false
    name: ""
    stringData: {}

  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "1"
      memory: 2Gi

  livenessProbe: {}
  readinessProbe: {}
  startupProbe: {}

  volumeMounts: []

initContainers: []
extraContainers: []

volumes: []

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# 启用后与 replicaCount 互斥：Deployment 不写 replicas，由 HPA 在 min/max 之间伸缩。
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

# 启用后与 replicaCount 互斥：Deployment 不写 replicas，由 CronHPA 的 jobs.targetSize 等调度副本。
chpa:
  enabled: false
  name: ""
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ""
  jobs:
    - name: scale-up-weekdays
      schedule: "0 0 8 * * 1-5"
      targetSize: 1
      runOnce: false
    - name: scale-down-weekdays
      schedule: "0 0 20 * * 1-5"
      targetSize: 0
      runOnce: false

pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: null

serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: null
  path: /metrics
  scheme: http
  relabelings: []
  metricRelabelings: []
  labels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# 可用区拓扑打散：启用后注入基于 topology.kubernetes.io/zone 的 topologySpreadConstraints，
# labelSelector 自动对齐本 Deployment 的 selector
# matchLabelKeys（Kubernetes 1.27+）：滚动更新时按标签值分组计数 skew，避免新旧 ReplicaSet 的 Pod 互相干扰。
# 参见：https://www.alibabacloud.com/help/zh/cs/user-guide/zone-topology-scattered
zoneTopologySpread:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  # DoNotSchedule：各可用区 Pod 数量差不超过 maxSkew，无法满足时不调度（生产高可用推荐配合多副本）。
  # ScheduleAnyway：尽量打散，无法满足时仍允许调度（单可用区或副本数较少时更不易 Pending）。
  whenUnsatisfiable: DoNotSchedule
  matchLabelKeys:
    - pod-template-hash

# 追加的拓扑分布约束（列表项会接在 zoneTopologySpread 生成的约束之后）。
topologySpreadConstraints: []
